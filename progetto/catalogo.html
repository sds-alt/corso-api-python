<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManiaci - Catalogo Locale</title>
</head>

<body style="font-family: sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; line-height: 1.5;">

    <h1>🎬 CineManiaci - Cerca Film</h1>
    <p>Cerca i titoli archiviati all'interno del database locale della piattaforma.</p>

    <div style="margin-bottom: 30px; background: #f1f5f9; padding: 15px; border-radius: 6px;">
        <input type="text" id="campoCerca" placeholder="Scrivi una parte del titolo (es. Matrix)..."
            style="padding: 8px; width: 300px; font-size: 14px;">
        <button onclick="avviaRicerca()" style="padding: 8px 15px; font-size: 14px; cursor: pointer;">Cerca</button>
    </div>

    <h2>Risultati della Ricerca</h2>
    <div id="risultati" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;">
    </div>

    <hr>

    <div id="schedaFilm"
        style="display: none; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 25px; border-radius: 8px;">
        <h2 id="schedaTitolo" style="color: #16a34a; margin-top: 0;"></h2>
        <p><b>Anno di Uscita:</b> <span id="schedaAnno"></span></p>
        <p><b>Trama del Film:</b></p>
        <p id="schedaTrama" style="font-style: italic; color: #374151;"></p>
    </div>


    <script>
        const API_URL = "https://turbo-space-zebra-4qjjpg7w5565hq5qj-8000.app.github.dev/";

        async function avviaRicerca() {

    let testo = document.getElementById("campoCerca").value;

    let risposta = await fetch(
        API_URL + "film/ricerca?keyword=" + testo
    );

    let Film = await risposta.json();

    let listaHtml = document.getElementById("risultati");

    // pulisce i risultati precedenti
    listaHtml.innerHTML = "";

    Film.forEach(p => {
        let div = document.createElement("div");

        div.innerHTML = `
            <h3>${p.titolo}</h3>
            <img src="${p.url_locandina}">
            <p>${p.anno}</p>            
         <button class="btn-film" onclick="apriScheda('${p.id}')">
            Azione
         </button>

        `;

        listaHtml.appendChild(div);
    });
}

        async function apriScheda(idFilm) {
          let risposta = await fetch(API_URL + 'film/' +idFilm);
          let film = await risposta.json();

          if (risposta.ok){
          
            alert(film.titolo + "\r " + film.anno );
          }
          
        }
      
    </script>
</body>

</html>
